function updateLeaderboardResetTime(){

    const now = Date.now();

    const koreaNow =
    new Date(now + 9 * 60 * 60 * 1000);

    const nextKoreaMidnight =
    Date.UTC(
        koreaNow.getUTCFullYear(),
        koreaNow.getUTCMonth(),
        koreaNow.getUTCDate() + 1
    ) - 9 * 60 * 60 * 1000;

    const remainingSeconds =
    Math.max(
        0,
        Math.floor(
            (nextKoreaMidnight - now) / 1000
        )
    );

    const hours =
    String(
        Math.floor(remainingSeconds / 3600)
    ).padStart(2,"0");

    const minutes =
    String(
        Math.floor(
            (remainingSeconds % 3600) / 60
        )
    ).padStart(2,"0");

    const seconds =
    String(
        remainingSeconds % 60
    ).padStart(2,"0");

    leaderboardResetInfo.textContent =
    `RESET IN ${hours}:${minutes}:${seconds} · SEOUL TIME (KST)`;
}

const audioCtx=new(window.AudioContext||window.webkitAudioContext)();

function beep(freq,duration){

    const osc=audioCtx.createOscillator();
    const gain=audioCtx.createGain();

    osc.type="square";
    osc.frequency.value=freq;

    osc.connect(gain);
    gain.connect(audioCtx.destination);

    gain.gain.value = volume;

    osc.start();

    setTimeout(()=>{
        osc.stop();
    },duration);
}

function successSound(){

    beep(900,80);

    setTimeout(()=>{
        beep(1300,120);
    },90);
}

function format(ms){

    const totalSec=Math.floor(ms/1000);

    const min=String(
        Math.floor(totalSec/60)
    ).padStart(2,'0');

    const sec=String(
        totalSec%60
    ).padStart(2,'0');

    const hun=String(
        Math.floor((ms%1000)/10)
    ).padStart(2,'0');

    return `${min}:${sec}.${hun}`;
}

async function submitLeaderboardRecord(){

    nicknameInput.value.trim().toUpperCase();

<script type="module">
import {
    initializeApp
} from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";

import {
    getAuth,
    onAuthStateChanged,
    signInAnonymously
} from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";

import {
    collection,
    doc,
    getDocs,
    getFirestore,
    limit,
    orderBy,
    query,
    runTransaction,
    serverTimestamp
} from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyBBMGlqCHSx_qpYMVMNjAlL8kQ-k69biEA",
    authDomain: "god-of-timing.firebaseapp.com",
    projectId: "god-of-timing",
    storageBucket: "god-of-timing.firebasestorage.app",
    messagingSenderId: "596583366865",
    appId: "1:596583366865:web:06fbf19ad605e0264d05f0"
};

const firebaseApp = initializeApp(firebaseConfig);
const firebaseAuth = getAuth(firebaseApp);
const firestoreDb = getFirestore(firebaseApp);

function getKoreaDayKey(){

    const parts =
    new Intl.DateTimeFormat(
        "en-US",
        {
            timeZone:"Asia/Seoul",
            year:"numeric",
            month:"2-digit",
            day:"2-digit"
        }
    ).formatToParts(new Date());

    const values = {};

    parts.forEach(part=>{
        values[part.type] = part.value;
    });

    return `${values.year}-${values.month}-${values.day}`;
}

function getPlayerScoreRef(uid){

    return doc(
        firestoreDb,
        "dailyScores",
        getKoreaDayKey(),
        "players",
        uid
    );
}

window.submitLeaderboardScore =
async function(nickname,combo){

    if(!nickname || combo < 1){

        return {
            ok:false,
            message:"INVALID RECORD"
        };
    }

    try{

        if(window.countryReady){

            await window.countryReady;
        }

        const country =
        (localStorage.getItem("playerCountry") || "")
        .trim()
        .toUpperCase();

        if(
            !/^[A-Z]{2}$/.test(country) ||
            country === "XX"
        ){

            console.warn(
                "Leaderboard registration skipped: country unavailable"
            );

            return {
                ok:false,
                message:"COUNTRY UNAVAILABLE"
            };
        }

        const {user} =
        await window.firebaseReady;

        const scoreRef =
        getPlayerScoreRef(user.uid);

        await runTransaction(
            firestoreDb,
            async(transaction)=>{

                const scoreSnapshot =
                await transaction.get(scoreRef);

                const scoreData = {
                    uid:user.uid,
                    day:getKoreaDayKey(),
                    nickname:nickname.slice(0,12),
                    country,
                    combo,
                    updatedAt:serverTimestamp()
                };

                if(scoreSnapshot.exists()){

                    scoreData.createdAt =
                    scoreSnapshot.data().createdAt;

                }else{

                    scoreData.createdAt =
                    serverTimestamp();
                }

                transaction.set(
                    scoreRef,
                    scoreData
                );
            }
        );

        console.log(
            "Leaderboard score saved:",
            combo
        );

        return {
            ok:true,
            message:"SUBMITTED"
        };

    }catch(error){

        console.error(
            "Leaderboard score save failed:",
            error
        );

        return {
            ok:false,
            message:"SUBMIT FAILED"
        };
    }
};

function createLeaderboardRow(
    rank,
    player,
    isCurrentPlayer
){

    const row =
    document.createElement("div");

    row.className =
    "leaderRow" +
    (isCurrentPlayer ? " currentPlayer" : "");

    const rankText =
    document.createElement("span");

    rankText.textContent = `${rank}.`;

    const nicknameText =
    document.createElement("span");

    nicknameText.textContent =
    player.nickname || "UNKNOWN";

    let countryElement;

    if(player.country){

        countryElement =
        document.createElement("img");

        countryElement.className =
        "leaderFlag";

        countryElement.src =
        `https://flagcdn.com/w80/${player.country.toLowerCase()}.png`;

        countryElement.alt =
        player.country;

    }else{

        countryElement =
        document.createElement("span");

        countryElement.className =
        "leaderCountryEmpty";

        countryElement.textContent = "🌐";
    }

    const comboText =
    document.createElement("span");

    comboText.textContent =
    `x${player.combo}`;

    row.append(
        rankText,
        nicknameText,
        countryElement,
        comboText
    );

    return row;
}

window.loadDailyLeaderboard =
async function(){

    const leaderboardList =
    document.getElementById("leaderboardList");

    leaderboardList.innerHTML =
    `<div class="leaderboardStatus">LOADING...</div>`;

    try{

        const {user} =
        await window.firebaseReady;

        const playersRef =
        collection(
            firestoreDb,
            "dailyScores",
            getKoreaDayKey(),
            "players"
        );

        const leaderboardQuery =
        query(
            playersRef,
            orderBy("combo","desc"),
            limit(50)
        );

        const snapshot =
        await getDocs(leaderboardQuery);

        leaderboardList.innerHTML = "";

        const validScores =
        snapshot.docs
        .filter(scoreDocument=>{

            const country =
            String(
                scoreDocument.data().country || ""
            ).toUpperCase();

            return (
                /^[A-Z]{2}$/.test(country) &&
                country !== "XX"
            );
        })
        .slice(0,20);

        if(validScores.length === 0){

            leaderboardList.innerHTML =
            `<div class="leaderboardStatus">NO RECORDS YET</div>`;

            return;
        }

        validScores.forEach(
            (scoreDocument,index)=>{

                leaderboardList.appendChild(
                    createLeaderboardRow(
                        index + 1,
                        scoreDocument.data(),
                        scoreDocument.id === user.uid
                    )
                );
            }
        );

    }catch(error){

        leaderboardList.innerHTML =
        `<div class="leaderboardStatus">FAILED TO LOAD</div>`;

        console.error(
            "Leaderboard load failed:",
            error
        );
    }
};

window.firebaseReady = new Promise((resolve,reject)=>{

    const unsubscribe =
    onAuthStateChanged(firebaseAuth,async(user)=>{

        if(user){

            window.firebaseUserId = user.uid;

            console.log(
                "Firebase anonymous login complete:",
                user.uid
            );

            unsubscribe();

            resolve({
                app:firebaseApp,
                auth:firebaseAuth,
                db:firestoreDb,
                user
            });

            return;
        }

        try{

            await signInAnonymously(firebaseAuth);

        }catch(error){

            console.error(
                "Firebase anonymous login failed:",
                error
            );

            unsubscribe();
            reject(error);
        }
    });
});
</script>
