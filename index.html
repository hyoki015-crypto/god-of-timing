<body>

<div class="panel">

```
<div class="left">

    <div class="title">
        TARGET: XX:XX.00<br>

            PRESS ANY KEY
    </div>

    <div class="timer-box">
        <div id="timer">00:00.00</div>
    </div>
<div class="comboBox">
    COMBO
    <div id="combo">x0</div>
</div>

    <div class="pauseText" id="pauseText">
        [ PAUSED ]
    </div>

    <div class="help">
    SPACE = PAUSE / RESUME<br>
    R = RESET
    </div>

</div>

<div class="right">

    <button id="resetBtn">
        RESET SYSTEM
    </button>

    <div class="stats">
        SUCCESS RATE :
        <span id="rate">0%</span><br>

        TOTAL :
        <span id="total">0</span><br>

        SUCCESS :
        <span id="successCount">0</span>
    </div>

    <div id="records"></div>

</div>
```

</div>

<script>

let combo = 0;

const comboText =
document.getElementById("combo");

const timer=document.getElementById("timer");
const records=document.getElementById("records");

const rate=document.getElementById("rate");
const totalText=document.getElementById("total");
const successText=document.getElementById("successCount");

const pauseText=document.getElementById("pauseText");

let running=false;
let paused=false;

let startTime=0;
let pausedAt=0;

let raf;

let total=0;
let successCount=0;

const audioCtx=new(window.AudioContext||window.webkitAudioContext)();

function beep(freq,duration){

    const osc=audioCtx.createOscillator();
    const gain=audioCtx.createGain();

    osc.type="square";
    osc.frequency.value=freq;

    osc.connect(gain);
    gain.connect(audioCtx.destination);

    gain.gain.value=.06;

    osc.start();

    setTimeout(()=>{
        osc.stop();
    },duration);
}

function successSound(){

    beep(900,80);

    setTimeout(()=>{
        beep(1300,120);
    },90);
}

function failSound(){

    beep(180,220);
}

function format(ms){

    const totalSec=Math.floor(ms/1000);

    const min=String(
        Math.floor(totalSec/60)
    ).padStart(2,'0');

    const sec=String(
        totalSec%60
    ).padStart(2,'0');

    const hun=String(
        Math.floor((ms%1000)/10)
    ).padStart(2,'0');

    return `${min}:${sec}.${hun}`;
}

function update(){

    timer.textContent=
    format(performance.now()-startTime);

    raf=requestAnimationFrame(update);
}

function start(){

    running=true;

    startTime=performance.now();

    update();
}

function togglePause(){

    if(!running) return;

    if(!paused){

        paused=true;

        pausedAt=performance.now();

        cancelAnimationFrame(raf);

        pauseText.style.opacity=1;

    }else{

        paused=false;

        startTime += performance.now()-pausedAt;

        pauseText.style.opacity=0;

        update();
    }
}

function confetti(){

    for(let i=0;i<50;i++){

        const p=document.createElement('div');

        p.className='particle';

        p.style.left='50%';
        p.style.top='50%';

        p.style.setProperty(
            '--x',
            (Math.random()-0.5)*700+'px'
        );

        p.style.setProperty(
            '--y',
            (Math.random()-0.5)*700+'px'
        );

        document.querySelector('.left')
        .appendChild(p);

        setTimeout(()=>{
            p.remove();
        },900);
    }
}

function updateStats(){

    totalText.textContent=total;
    successText.textContent=successCount;

    if(total===0){

        rate.textContent='0%';
        return;
    }

    rate.textContent=
    ((successCount/total)*100).toFixed(1)+'%';
}

function recordTime(){

    if(paused) return;

    const elapsed=
    performance.now()-startTime;

    const hundredths=
    Math.floor((elapsed%1000)/10);

    const success=
    (hundredths<=5 || hundredths>=95);

    total++;

    const row=document.createElement('div');

    row.className='record';

  if(success){

    successCount++;

    combo++;

    comboText.textContent =
    "x" + combo;

    row.classList.add('success');

    successSound();

    confetti();

}else{

    combo = 0;

    comboText.textContent =
    "x0";

    row.classList.add('fail');

    failSound();
}

    row.innerHTML=
    `<span>${format(elapsed)}</span>
     <span>${success ? 'SUCCESS' : 'FAIL'}</span>`;

    records.prepend(row);

    updateStats();
}

function action(){

    if(!running){

        audioCtx.resume();

        start();

        return;
    }

    if(paused){

        paused = false;

        startTime += performance.now() - pausedAt;

        pauseText.style.opacity = 0;

        update();

        return;
    }

    recordTime();
}

function resetGame(){

combo = 0;

comboText.textContent = "x0";
    running=false;
    paused=false;

    cancelAnimationFrame(raf);

    timer.textContent='00:00.00';

    records.innerHTML='';

    pauseText.style.opacity=0;

    total=0;
    successCount=0;

    updateStats();
}

document.addEventListener('keydown',(e)=>{

    if(e.repeat) return;

    const key=e.key.toLowerCase();

    // 스페이스 = 일시정지
    if(e.code === 'Space'){

        e.preventDefault();

        togglePause();
        return;
    }

    // R = 리셋
    if(key === 'r'){

        resetGame();
        return;
    }

    // 나머지 키 = 기록
    action();
});

document.addEventListener('mousedown',()=>{

    action();
});

document.getElementById('resetBtn')
.addEventListener('click',(e)=>{

    e.stopPropagation();

    resetGame();
});

</script>
